<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>“罗曰”三星⭐⭐⭐全球董事会交流群专用工具</title>
    <style>
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #f4f5f7; 
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .container {
            background-color: #fff;
            max-width: 800px;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            padding: 40px 30px;
            box-sizing: border-box;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 30px;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            resize: vertical;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s;
            background-color: #fafafa;
            color: #333;
        }
        textarea:focus {
            border-color: #3498db;
            background-color: #fff;
            box-shadow: 0 0 8px rgba(52, 152, 219, 0.2);
        }
        textarea::placeholder {
            color: #999;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            color: #fff;
            transition: transform 0.1s, opacity 0.3s;
            font-weight: bold;
        }
        button:active {
            transform: scale(0.96);
        }
        button:hover {
            opacity: 0.85;
        }
        .btn-encode { background-color: #e67e22; } 
        .btn-decode { background-color: #27ae60; } 
        .btn-copy { background-color: #2980b9; } 
        .btn-clear { background-color: #95a5a6; } 
        
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #bdc3c7;
            text-align: center;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>“罗曰”三星⭐⭐⭐全球董事会交流群专用工具</h1>
    <div class="subtitle">【高度机密 · 内部专享 · 兼容外部API接口】</div>

    <textarea id="inputText" placeholder=">_ 请在此输入最高机密原文，或粘贴带有“罗曰：”或“佛曰：”的加密指令..."></textarea>

    <div class="buttons">
        <button class="btn-encode" onclick="encodeText()">加密混淆 (生成罗曰)</button>
        <button class="btn-decode" onclick="decodeText()">解密授权 (还原明文)</button>
    </div>
    
    <div class="buttons" style="margin-top: 0;">
        <button class="btn-copy" onclick="copyText()">复制输出结果</button>
        <button class="btn-clear" onclick="clearText()">清空操作台</button>
    </div>

    <textarea id="outputText" placeholder=">_ 董事会加密/解密结果将在此处显示..." readonly></textarea>
    
    <div class="footer">
        * 警告：本终端采用“罗氏”专属特制核心字库矩阵进行高强度混淆加密。<br>
        * 外部兼容：检测到“佛曰”指令时，将自动调用第三方网络接口进行云端解析。<br>
        * 防御机制：纯本地脱机运算，防拦截、防嗅探（外部接口请求除外）。
    </div>
</div>

<script>
    // 采用最稳定的语法声明变量，防止老旧浏览器死机
    var b64chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/=";
    var dict = "阿弥陀佛观世音菩萨大势至地藏王文殊普贤如来金刚般若波罗蜜多心经法华楞严清净慈悲喜舍因果轮回涅槃善恶业报无明烦恼提缘起性空界众生宝德";
    var PREFIX_LUO = "罗曰：";
    var PREFIX_FO = "佛曰：";

    // 1. 加密功能（原生罗曰保持不变）
    function encodeText() {
        var input = document.getElementById('inputText').value;
        if (!input) {
            alert('系统警告：请输入需要加密的内容！');
            return;
        }
        try {
            var b64 = btoa(unescape(encodeURIComponent(input)));
            var result = PREFIX_LUO;
            for (var i = 0; i < b64.length; i++) {
                var index = b64chars.indexOf(b64[i]);
                if (index !== -1) {
                    result += dict[index];
                }
            }
            document.getElementById('outputText').value = result;
        } catch (e) {
            alert("加密异常：包含无法处理的特殊指令符号。");
        }
    }

    // 2. 解密功能（原生解密 + API 接口请求）
    function decodeText() {
        var input = document.getElementById('inputText').value.trim();
        var outputBox = document.getElementById('outputText');

        if (!input) {
            alert('系统警告：请输入需要解密的密文！');
            return;
        }

        // 分支 1：处理专属的“罗曰” (本地极速解密)
        if (input.indexOf(PREFIX_LUO) === 0) {
            try {
                var cipher = input.substring(PREFIX_LUO.length);
                var b64 = "";
                for (var i = 0; i < cipher.length; i++) {
                    var index = dict.indexOf(cipher[i]);
                    if (index !== -1) {
                        b64 += b64chars[index];
                    }
                }
                if (!b64) {
                    alert("解析失败：未检测到有效的罗曰加密矩阵。");
                    return;
                }
                outputBox.value = decodeURIComponent(escape(atob(b64)));
            } catch (e) {
                alert("解密失败：罗曰密文数据已损坏或遭到未授权篡改。");
            }
        } 
        // 分支 2：处理外部的“佛曰”（调用接口）
        else if (input.indexOf(PREFIX_FO) === 0) {
            outputBox.value = "【云端解析中】正在对接第三方网络接口，请稍候...";
            
            // 经典的 Promise 网络请求写法，兼容性极高
            var targetApiUrl = "https://pi.hahaka.com/api/decode"; 
            
            fetch(targetApiUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({ text: input })
            })
            .then(function(response) {
                if (!response.ok) {
                    throw new Error("HTTP 状态码: " + response.status);
                }
                return response.json();
            })
            .then(function(data) {
                if (data && (data.result || data.text || data.data)) {
                    outputBox.value = data.result || data.text || data.data;
                } else {
                    outputBox.value = "【云端解析异常】第三方接口响应成功，但未返回可识别的明文内容。可能该网站接口路径不匹配。";
                }
            })
            .catch(function(error) {
                // 如果遭遇 CORS 跨域拦截，直接在文本框输出友好提示，绝不让网页死机
                outputBox.value = "【跨域/网络阻断】\n前端无法直接跨域(CORS)请求第三方域名接口。\n错误信息：" + error.message + "\n\n解决建议：这并非代码Bug，而是浏览器强制的安全拦截。纯本地HTML无法越权去拉取第三方网站的私有数据。若要强行对接，必须配置服务端代理。";
            });
        } 
        else {
            alert("权限拒绝：密文协议头不匹配，必须以“罗曰：”或“佛曰：”开头！");
        }
    }

    // 3. 复制功能
    function copyText() {
        var output = document.getElementById('outputText');
        if (!output.value) {
            alert("操作台无数据可复制。");
            return;
        }
        output.select();
        document.execCommand("copy");
        alert("指令已安全复制到剪贴板！");
    }

    // 4. 清空功能
    function clearText() {
        document.getElementById('inputText').value = "";
        document.getElementById('outputText').value = "";
    }
</script>

</body>
</html>
