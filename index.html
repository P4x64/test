<script>
    // ==========================================
    // 第一部分：我们的专属“罗曰”基础算法
    // ==========================================
    const luo_b64chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/=";
    const luo_dict = "阿弥陀佛观世音菩萨大势至地藏王文殊普贤如来金刚般若波罗蜜多心经法华楞严清净慈悲喜舍因果轮回涅槃善恶业报无明烦恼提缘起性空界众生宝德";
    const PREFIX_LUO = "罗曰：";

    function encodeLuo(text) {
        let b64 = btoa(unescape(encodeURIComponent(text)));
        let result = PREFIX_LUO;
        for (let i = 0; i < b64.length; i++) {
            let index = luo_b64chars.indexOf(b64[i]);
            if (index !== -1) {
                result += luo_dict[index];
            }
        }
        return result;
    }

    function decodeLuo(text) {
        let b64 = "";
        for (let i = 0; i < text.length; i++) {
            let index = luo_dict.indexOf(text[i]);
            if (index !== -1) {
                b64 += luo_b64chars[index];
            }
        }
        if (!b64) return null;
        return decodeURIComponent(escape(atob(b64)));
    }


    // ==========================================
    // 第二部分：根据 GitHub 开源源码逆向复刻的原版“佛曰”算法
    // ==========================================
    const PREFIX_FO = "佛曰：";
    const fo_tudou = ['滅', '苦', '婆', '娑', '耶', '陀', '跋', '多', '漫', '都', '殿', '悉', '夜', '爍', '帝', '吉', '利', '阿', '無', '南', '那', '怛', '喝', '羯', '勝', '摩', '伽', '謹', '波', '者', '穆', '僧', '室', '藝', '尼', '瑟', '地', '彌', '菩', '提', '蘇', '醯', '盧', '呼', '舍', '佛', '參', '沙', '伊', '隸', '麼', '遮', '闍', '度', '蒙', '孕', '薩', '夷', '迦', '他', '姪', '豆', '特', '逝', '
